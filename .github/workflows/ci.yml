# Runs the test suite. Keep light during the prototype; add lint/type-check/
# coverage as blocking steps once the project is a product.
# Triggers: PRs cover feature branches; push:main covers post-merge — so each
# situation runs exactly once (no duplicate runs on branches that have a PR).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install deps
        run: |
          python -m venv venv
          ./venv/bin/pip install -r requirements.txt
          ./venv/bin/pip install pytest
      - name: Run tests
        run: ./venv/bin/pytest -q

      # ── Node (uncomment if this is a Node/JS project, remove Python block) ──
